<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //浅拷贝 
        //a存在栈内 存储的基本类型值是100 
        //a赋值给b b也存在栈内 存储的基本类型值是100
        //ab两个是相互独立的 互不影响
        let a =100;
        let b =a;
        a = 200;
        console.log(b);

        //c存在栈内 存储的引用类型值是[1,2,3]的地址
        //c赋值给d d也存在栈内 存储的引用类型值是[1,2,3]的地址
        //cd两个是相互依赖的 互相关联的 也就
        let c = [1,2,3];
        let d = c;
        c[0] = 100;
        console.log(d);

        //深拷贝
        //e存在栈里 数组里面的数据存在堆里 栈存储的只是堆里数据的地址
        //e赋值给f f也存在栈里 f数组存在新的堆里
        //当e数组被改变时 因为ef是两个单独的数组 所以f不会受影响
        let e = [1,2,3];
        let f = [...e];
        e[0] = 100;
        console.log(f);

    </script>
</body>

</html>
