<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //数组去重
        //1.方法一:Array.from() + new Set()
        //new Set（）方法可以从一个数组中创建一个新的 Set 对象，Set 对象是一种集合类型，它只允许存储唯一的值。当你将一个数组传递给 Set 构造函数时，Set 会自动去除数组中的重复元素，并返回一个新的 Set 对象。通过使用 Set 对象，你可以轻松地实现数组去重的功能。
        var arr1 =[1,2,3,2,4,1];
        //Array.from()能够把项数组的内容变成应该真正的数组
        console.log(Array.from(new Set(arr1)));

        //2.方法二:[...new Set()]
        var arr2 =[1,2,3,2,4,1];
        console.log(...[new Set(arr2)]);

        //封装函数
        function unique(arr){
            return[...new Set(arr)];
        }
        console.log(unique(arr1));
        console.log(unique(arr2));
    </script>
</body>
</html>
